name: Deploy site

# Build the static landing/download page and publish it to GitHub Pages on every
# push to main that touches the site. Requires Pages enabled with "GitHub Actions"
# as the source (Settings → Pages → Build and deployment → Source: GitHub Actions).

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - ".github/workflows/deploy-site.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 11.5.0

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Build site
        run: |
          pnpm -C site install
          pnpm -C site build

      - uses: actions/configure-pages@v6

      - uses: actions/upload-pages-artifact@v5
        with:
          path: site/dist

      - id: deploy
        uses: actions/deploy-pages@v5
