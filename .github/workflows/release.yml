name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  extension:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.5.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test
      - run: pnpm build
      - run: pnpm check
      - run: pnpm --filter @watch-party-sync/extension zip
      - uses: softprops/action-gh-release@v2
        with:
          files: extension/.output/watch-party-sync-*-chrome.zip
